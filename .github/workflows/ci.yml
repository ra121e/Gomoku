name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality-and-build:
    name: Quality And Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check formatting
        run: bun run format:check

      - name: Lint code
        run: bun run lint

      - name: Generate Prisma client
        run: bun run prisma:generate

      - name: Build app
        run: bun run build

      - name: Validate Compose config
        env:
          POSTGRES_PASSWORD: ci-password
        run: docker compose -f docker-compose.yml -f docker-compose.dev.yml config

      - name: Smoke test realtime server
        run: |
          bun run start:realtime > /tmp/realtime.log 2>&1 &
          REALTIME_PID=$!

          cleanup() {
            kill "$REALTIME_PID" 2>/dev/null || true
            wait "$REALTIME_PID" 2>/dev/null || true
          }

          trap cleanup EXIT

          for attempt in {1..20}; do
            if curl --fail --silent http://127.0.0.1:3001/health > /tmp/realtime-health.json; then
              cat /tmp/realtime-health.json
              exit 0
            fi

            if ! kill -0 "$REALTIME_PID" 2>/dev/null; then
              break
            fi

            sleep 1
          done

          cat /tmp/realtime.log
          exit 1
