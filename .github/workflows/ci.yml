name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality-and-build:
    name: Quality And Build
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://transcendence:ci-password@127.0.0.1:5432/transcendence?schema=public

    services:
      postgres:
        image: postgres:18.3-alpine
        env:
          POSTGRES_DB: transcendence
          POSTGRES_USER: transcendence
          POSTGRES_PASSWORD: ci-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U transcendence -d transcendence"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check formatting
        run: bun run format:check

      - name: Lint code
        run: bun run lint

      - name: Generate Prisma client
        run: bun run prisma:generate

      - name: Apply database migrations
        run: bun run prisma:migrate:deploy

      - name: Run tests
        run: bun test

      - name: Build app
        env:
          BETTER_AUTH_SECRET: ci_better_auth_secret_change_me_32_chars
          BETTER_AUTH_URL: http://localhost:3000
        run: bun run build

      - name: Install Playwright browsers
        run: bun run pw:install --with-deps chromium

      - name: Run Playwright E2E tests
        env:
          BETTER_AUTH_SECRET: ci_better_auth_secret_change_me_32_chars
          BETTER_AUTH_URL: http://localhost:3000
          PLAYWRIGHT_WEB_SERVER_COMMAND: bun run start
        run: bun run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload Playwright test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results/
          if-no-files-found: ignore
          retention-days: 7

      - name: Validate Compose config
        env:
          BETTER_AUTH_SECRET: ci_better_auth_secret_change_me_32_chars
          POSTGRES_PASSWORD: ci-password
        run: docker compose -f docker-compose.yml -f docker-compose.dev.yml config

      - name: Smoke test realtime server
        run: |
          bun run start:realtime > /tmp/realtime.log 2>&1 &
          REALTIME_PID=$!

          cleanup() {
            kill "$REALTIME_PID" 2>/dev/null || true
            wait "$REALTIME_PID" 2>/dev/null || true
          }

          trap cleanup EXIT

          for attempt in {1..20}; do
            if curl --fail --silent http://127.0.0.1:3001/health > /tmp/realtime-health.json; then
              cat /tmp/realtime-health.json
              exit 0
            fi

            if ! kill -0 "$REALTIME_PID" 2>/dev/null; then
              break
            fi

            sleep 1
          done

          cat /tmp/realtime.log
          exit 1
