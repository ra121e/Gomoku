services:
  database:
    image: postgres:18.3-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-transcendence}
      POSTGRES_USER: ${POSTGRES_USER:-transcendence}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - transcendence
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  app:
    build:
      context: .
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-transcendence}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@database:5432/${POSTGRES_DB:-transcendence}?schema=public
      SOCKET_PUBLIC_URL: http://localhost:3001
    ports:
      - "3000:3000"
    depends_on:
      database:
        condition: service_healthy
    networks:
      - transcendence
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  realtime:
    build:
      context: .
    command: ["bun", "run", "start:realtime"]
    environment:
      NODE_ENV: production
      SOCKET_HOST: 0.0.0.0
      SOCKET_PORT: 3001
      SOCKET_CORS_ORIGIN: http://localhost:3000
    ports:
      - "3001:3001"
    networks:
      - transcendence
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "-e",
          "fetch('http://127.0.0.1:3001/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

networks:
  transcendence:
    driver: bridge

volumes:
  postgres_data:
