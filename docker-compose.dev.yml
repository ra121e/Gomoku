services:
  database:
    ports:
      - "5432:5432"

  app:
    build:
      target: dev
    environment:
      NODE_ENV: development
      SOCKET_PUBLIC_URL: https://localhost:8443
    volumes:
      - .:/app
      - ./.docker-data/app/node_modules:/app/node_modules
      - ./.docker-data/app/next:/app/.next
      - ./.docker-data/app/generated:/app/generated
    healthcheck:
      start_period: 40s

  realtime:
    build:
      target: dev
    command: ["bun", "run", "dev:realtime"]
    depends_on:
      app:
        condition: service_healthy
      database:
        condition: service_healthy
    environment:
      NODE_ENV: development
      SOCKET_HOST: 0.0.0.0
      SOCKET_PORT: 3001
      SOCKET_CORS_ORIGIN: https://localhost:8443
    volumes:
      - .:/app
      - ./.docker-data/app/node_modules:/app/node_modules
    healthcheck:
      start_period: 5s
