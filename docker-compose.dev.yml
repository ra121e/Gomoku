services:
  database:
    ports:
      - "5432:5432"

  backend:
    build:
      target: dev
    environment:
      NODE_ENV: development
    volumes:
      - ./apps/backend:/app
      - backend_node_modules:/app/node_modules
      - backend_next:/app/.next
    healthcheck:
      start_period: 40s

  frontend:
    build:
      target: dev
    environment:
      NODE_ENV: development
      BACKEND_INTERNAL_URL: http://backend:3001
      SOCKET_PUBLIC_URL: http://localhost:3001
    volumes:
      - ./apps/frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    healthcheck:
      start_period: 40s

volumes:
  backend_node_modules:
  backend_next:
  frontend_node_modules:
  frontend_next:
