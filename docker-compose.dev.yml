services:
  database:
    ports:
      - "5432:5432"

  app:
    build:
      target: dev
    environment:
      NODE_ENV: development
      SOCKET_PUBLIC_URL: http://localhost:3001
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
      - app_next:/app/.next
      - app_generated_prisma:/app/generated/prisma
    healthcheck:
      start_period: 40s

  realtime:
    build:
      target: dev
    command:
      ["sh", "-c", "bun install --frozen-lockfile && bun run dev:realtime"]
    environment:
      NODE_ENV: development
      SOCKET_HOST: 0.0.0.0
      SOCKET_PORT: 3001
      SOCKET_CORS_ORIGIN: http://localhost:3000
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
    healthcheck:
      start_period: 5s

volumes:
  app_generated_prisma:
  app_node_modules:
  app_next:
